<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;touch-action:none;user-select:none;}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.wrap{background:#111;border:0.5px solid #2a2a2a;border-radius:20px;padding:16px 12px 20px;font-family:'Courier New',monospace;width:360px;}
h1{text-align:center;font-size:13px;letter-spacing:4px;color:#00e5ff;margin-bottom:14px;}
.stats{display:flex;justify-content:center;gap:16px;margin-bottom:14px;}
.stat{text-align:center;}
.lbl{display:block;font-size:9px;letter-spacing:2px;color:#555;text-transform:uppercase;}
.val{display:block;font-size:18px;font-weight:700;color:#00e5ff;min-width:52px;}
.val.ok{color:#00e676;} .val.warn{color:#ff5722;}
.div{width:0.5px;background:#2a2a2a;}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;}
.jw{display:flex;flex-direction:column;align-items:center;gap:6px;}
.jlbl{font-size:9px;letter-spacing:2px;color:#444;text-transform:uppercase;}
.jz{width:130px;height:130px;border-radius:50%;background:#1a1a1a;border:1.5px solid #2a2a2a;position:relative;cursor:grab;}
.ring{position:absolute;inset:12px;border-radius:50%;border:0.5px solid #222;}
.cross{position:absolute;inset:0;pointer-events:none;}
.cross::before{content:'';position:absolute;top:50%;left:8px;right:8px;height:0.5px;background:#1e1e1e;transform:translateY(-50%);}
.cross::after{content:'';position:absolute;left:50%;top:8px;bottom:8px;width:0.5px;background:#1e1e1e;transform:translateX(-50%);}
.knob{width:44px;height:44px;border-radius:50%;background:#1e1e1e;border:1.5px solid #333;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 0 2px #00e5ff22;}
.knob.on{box-shadow:0 0 0 3px #00e5ff55;}
.mid{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;}
.estop{width:52px;height:52px;border-radius:50%;background:#1a0505;border:2px solid #c62828;color:#ef5350;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;font-family:'Courier New',monospace;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.3;}
.estop:active{background:#2a0808;}
.ipr{display:flex;align-items:center;gap:8px;justify-content:center;}
.ip{background:#1a1a1a;border:0.5px solid #2a2a2a;border-radius:6px;color:#00e5ff;font-family:'Courier New',monospace;font-size:11px;padding:4px 8px;width:130px;outline:none;touch-action:auto;}
.dot{width:8px;height:8px;border-radius:50%;background:#333;}
.dot.ok{background:#00e676;} .dot.err{background:#ef5350;}
.badge{display:block;text-align:center;margin-top:6px;font-size:9px;letter-spacing:2px;color:#444;}
.badge.on{color:#00e5ff;}
.auto-btn{width:52px;height:52px;border-radius:50%;background:#1a1a1a;border:2px solid #333;color:#00e5ff;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;font-family:'Courier New',monospace;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.2;margin-top:6px;transition:all 0.3s;}
.auto-btn:active{background:#2a2a2a;}
.auto-btn.active{background:#1a3a1a;border-color:#00e676;color:#00e676;}
.dist{text-align:center;font-size:11px;color:#00e5ff;margin-top:6px;font-family:'Courier New',monospace;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Warehouse Bot</h1>
  <div class="stats">
    <div class="stat"><span class="lbl">L Motor</span><span class="val" id="lv">0</span></div>
    <div class="div"></div>
    <div class="stat"><span class="lbl">Speed %</span><span class="val ok" id="sp">0</span></div>
    <div class="div"></div>
    <div class="stat"><span class="lbl">R Motor</span><span class="val" id="rv">0</span></div>
  </div>
  <div class="row">
    <div class="jw">
      <span class="jlbl">Forward/Back</span>
      <div class="jz" id="lj"><div class="cross"></div><div class="ring"></div><div class="knob" id="lk"></div></div>
    </div>
    <div class="mid">
      <svg width="70" height="70" viewBox="0 0 70 70">
        <circle cx="35" cy="35" r="28" fill="none" stroke="#1e1e1e" stroke-width="5"/>
        <circle cx="35" cy="35" r="28" fill="none" stroke="#00e5ff" stroke-width="5"
          stroke-dasharray="175.9" stroke-dashoffset="175.9"
          stroke-linecap="round" transform="rotate(-90 35 35)" id="arc"/>
        <text x="35" y="40" text-anchor="middle" font-family="Courier New"
          font-size="11" font-weight="700" fill="#00e5ff" id="at">0%</text>
      </svg>
      <button class="estop" id="es">E<br>STOP</button>
    </div>
    <div class="jw">
      <span class="jlbl">Left/Right</span>
      <div class="jz" id="rj"><div class="cross"></div><div class="ring"></div><div class="knob" id="rk"></div></div>
    </div>
  </div>
  <div class="ipr">
    <span class="lbl">Bot IP</span>
    <input class="ip" id="ip" value="192.168.1.100" spellcheck="false"/>
    <div class="dot" id="dot"></div>
  </div>
  <div style="display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap;">
    <button id="id1Btn" style="padding:6px 12px;border-radius:6px;background:#2563eb;border:none;color:white;font-weight:700;">ID 1</button>
    <button id="id2Btn" style="padding:6px 12px;border-radius:6px;background:#16a34a;border:none;color:white;font-weight:700;">ID 2</button>
    <button id="id3Btn" style="padding:6px 12px;border-radius:6px;background:#dc2626;border:none;color:white;font-weight:700;">ID 3</button>
    <button id="manualBtn" style="padding:6px 12px;border-radius:6px;background:#444;border:none;color:white;font-weight:700;">Manual</button>
    <button id="rssiBtn" style="padding:6px 12px;border-radius:6px;background:#8b5cf6;border:none;color:white;font-weight:700;">Show RSSI</button>
  </div>
  <div style="text-align:center;margin-top:8px;color:#9ca3af;">RSSI: <span id="rssiVal">--</span></div>
  <button class="auto-btn" id="auto">AUTO</button>
  <div class="dist">Distance: <span id="dist">--</span> cm</div>
  <span class="badge" id="badge">Standby</span>
</div>
<script>
(function(){
  var lv=document.getElementById('lv'),rv=document.getElementById('rv'),sp=document.getElementById('sp');
  var arc=document.getElementById('arc'),at=document.getElementById('at');
  var dot=document.getElementById('dot'),badge=document.getElementById('badge');
  var distDisp=document.getElementById('dist');
  var FB=0,TURN=0,tmr=null,last='';
  var autoMode=false,autoTmr=null;
  
  function joy(zone,knob,cb,axis){
    var on=false,pid=null;
    function mv(cx,cy){
      if(autoMode)return;
      var rc=zone.getBoundingClientRect();
      var dx=cx-(rc.left+rc.width/2), dy=cy-(rc.top+rc.height/2);
      var d=Math.sqrt(dx*dx+dy*dy), max=rc.width/2-22;
      if(d>max){dx=dx/d*max;dy=dy/d*max;}
      knob.style.transform='translate(calc(-50% + '+Math.round(dx)+'px),calc(-50% + '+Math.round(dy)+'px))';
      var val = axis==='y' ? Math.round(-dy/max*255) : Math.round(dx/max*255);
      cb(val);
    }
    function rel(){if(!on)return;on=false;pid=null;knob.classList.remove('on');knob.style.transform='translate(-50%,-50%)';if(!autoMode)cb(0);}
    zone.addEventListener('touchstart',function(e){e.preventDefault();on=true;pid=e.changedTouches[0].identifier;knob.classList.add('on');mv(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
    zone.addEventListener('touchmove',function(e){e.preventDefault();if(!on)return;for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===pid){mv(e.changedTouches[i].clientX,e.changedTouches[i].clientY);break;}}},{passive:false});
    zone.addEventListener('touchend',rel,{passive:false});
    zone.addEventListener('touchcancel',rel,{passive:false});
    zone.addEventListener('mousedown',function(e){on=true;knob.classList.add('on');mv(e.clientX,e.clientY);function mm(e){if(on)mv(e.clientX,e.clientY);}function mu(){rel();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);}document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
  }
  
  joy(document.getElementById('lj'),document.getElementById('lk'),function(v){FB=v;upd();},'y');
  joy(document.getElementById('rj'),document.getElementById('rk'),function(v){TURN=v;upd();},'x');
  
  function upd(){
    var L = Math.max(-255, Math.min(255, FB + TURN));
    var R = Math.max(-255, Math.min(255, FB - TURN));
    lv.textContent=L; rv.textContent=R;
    var s=Math.round((Math.abs(L)+Math.abs(R))/2/255*100);
    sp.textContent=s; sp.className='val '+(s>70?'warn':s>0?'ok':'');
    arc.setAttribute('stroke-dashoffset',(175.9-s/100*175.9).toFixed(1));
    at.textContent=s+'%';
    var mv=L!==0||R!==0;
    badge.textContent=mv?'Moving':'Standby'; badge.className='badge'+(mv?' on':'');
    if(!tmr && !autoMode)tmr=setTimeout(function(){tmr=null;var k=L+','+R;if(k!==last){last=k;go(L,R);}},50);
  }
  function ip(){return document.getElementById('ip').value.trim();}
  function go(l,r){fetch('http://'+ip()+'/drive?l='+l+'&r='+r,{mode:'no-cors'}).then(function(){dot.className='dot ok';}).catch(function(){dot.className='dot err';});}
  window.goID = function(id){fetch('http://'+ip()+'/id'+id,{mode:'no-cors'}).then(function(){badge.textContent='Going to ID '+id;}).catch(function(){badge.textContent='ESP32 OFFLINE';});}
  window.setManual = function(){
    // turn off auto mode on the bot
    fetch('http://'+ip()+'/auto?mode=0',{mode:'no-cors'}).then(function(){badge.textContent='Manual Mode'; autoBtn.classList.remove('active');}).catch(function(){badge.textContent='ESP32 OFFLINE';});
  }

  window.showRSSI = function(){
    var out = document.getElementById('rssiVal');
    out.textContent='...';
    fetch('http://'+ip()+'/rssi').then(function(r){return r.json();}).then(function(d){ if(d.rssi===-1000) out.textContent='not found'; else out.textContent=d.rssi + ' dBm'; }).catch(function(){ out.textContent='err'; });
  }

  document.getElementById('id1Btn').addEventListener('click', function(){ goID(1); });
  document.getElementById('id2Btn').addEventListener('click', function(){ goID(2); });
  document.getElementById('id3Btn').addEventListener('click', function(){ goID(3); });
  document.getElementById('manualBtn').addEventListener('click', setManual);
  document.getElementById('rssiBtn').addEventListener('click', showRSSI);
  
  function getDist(){
    fetch('http://'+ip()+'/distance',{mode:'no-cors'}).then(function(r){return r.json();}).then(function(d){distDisp.textContent=d.distance;}).catch(function(){distDisp.textContent='--';});
  }
  
  var autoBtn=document.getElementById('auto');
  autoBtn.addEventListener('click',function(){
    autoMode=!autoMode;
    autoBtn.classList.toggle('active');
    FB=0;TURN=0;
    if(autoMode){
      badge.textContent='Auto Mode'; badge.className='badge on';
      autoTmr=setInterval(getDist,100);
      fetch('http://'+ip()+'/auto?mode=1',{mode:'no-cors'});
    }else{
      badge.textContent='Standby'; badge.className='badge';
      clearInterval(autoTmr);
      fetch('http://'+ip()+'/auto?mode=0',{mode:'no-cors'}).catch(function(){});
      fetch('http://'+ip()+'/stop',{mode:'no-cors'}).catch(function(){});
    }
  });
  
  var es=document.getElementById('es');
  es.addEventListener('click',function(){FB=0;TURN=0;autoMode=false;autoBtn.classList.remove('active');if(autoTmr)clearInterval(autoTmr);upd();fetch('http://'+ip()+'/stop',{mode:'no-cors'}).catch(function(){});});
  es.addEventListener('touchstart',function(e){e.preventDefault();es.click();},{passive:false});
})();
</script>
</body>
</html>
