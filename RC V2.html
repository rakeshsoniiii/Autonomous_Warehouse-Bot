<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;touch-action:none;user-select:none;}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:8px 0;}
.wrap{background:#111;border:0.5px solid #2a2a2a;border-radius:20px;padding:16px 12px 20px;font-family:'Courier New',monospace;width:360px;}
h1{text-align:center;font-size:13px;letter-spacing:4px;color:#00e5ff;margin-bottom:10px;}
.stats{display:flex;justify-content:center;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.stat{text-align:center;}
.lbl{display:block;font-size:9px;letter-spacing:2px;color:#555;text-transform:uppercase;}
.val{display:block;font-size:16px;font-weight:700;color:#00e5ff;min-width:44px;}
.val.ok{color:#00e676;} .val.warn{color:#ff5722;}
.div{width:0.5px;background:#2a2a2a;align-self:stretch;}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;}
.jw{display:flex;flex-direction:column;align-items:center;gap:6px;}
.jlbl{font-size:9px;letter-spacing:2px;color:#444;text-transform:uppercase;}
.jz{width:120px;height:120px;border-radius:50%;background:#1a1a1a;border:1.5px solid #2a2a2a;position:relative;cursor:grab;}
.ring{position:absolute;inset:12px;border-radius:50%;border:0.5px solid #222;}
.cross{position:absolute;inset:0;pointer-events:none;}
.cross::before{content:'';position:absolute;top:50%;left:8px;right:8px;height:0.5px;background:#1e1e1e;transform:translateY(-50%);}
.cross::after{content:'';position:absolute;left:50%;top:8px;bottom:8px;width:0.5px;background:#1e1e1e;transform:translateX(-50%);}
.knob{width:40px;height:40px;border-radius:50%;background:#1e1e1e;border:1.5px solid #333;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 0 2px #00e5ff22;}
.knob.on{box-shadow:0 0 0 3px #00e5ff55;}
.mid{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;}
.estop{width:48px;height:48px;border-radius:50%;background:#1a0505;border:2px solid #c62828;color:#ef5350;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;font-family:'Courier New',monospace;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.3;}
.estop:active{background:#2a0808;}
.ipr{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:8px;}
.ip{background:#1a1a1a;border:0.5px solid #2a2a2a;border-radius:6px;color:#00e5ff;font-family:'Courier New',monospace;font-size:11px;padding:4px 8px;width:130px;outline:none;touch-action:auto;}
.dot{width:8px;height:8px;border-radius:50%;background:#333;flex-shrink:0;}
.dot.ok{background:#00e676;} .dot.err{background:#ef5350;}
.badge{display:block;text-align:center;margin-top:6px;font-size:9px;letter-spacing:2px;color:#444;}
.badge.on{color:#00e5ff;}
.badge.nav{color:#ffd740;}
.btn-row{display:flex;gap:8px;justify-content:center;margin:8px 0;}
.mode-btn{flex:1;background:#1a1a1a;border:1.5px solid #333;border-radius:8px;color:#00e5ff;font-family:'Courier New',monospace;font-size:9px;font-weight:700;letter-spacing:1px;padding:10px 4px;cursor:pointer;text-transform:uppercase;}
.mode-btn:active{background:#2a2a2a;}
.mode-btn.active{background:#1a3a1a;border-color:#00e676;color:#00e676;}
.mode-btn.nav-active{background:#2a2510;border-color:#ffd740;color:#ffd740;}
.box-row{display:flex;gap:6px;justify-content:center;margin-bottom:6px;}
.box-btn{flex:1;background:#1a1a1a;border:1.5px solid #333;border-radius:6px;color:#888;font-family:'Courier New',monospace;font-size:10px;font-weight:700;padding:8px 2px;cursor:pointer;}
.box-btn.sel{border-color:#00e5ff;color:#00e5ff;}
.nav-go{width:100%;background:#1a251a;border:1.5px solid #00e676;border-radius:8px;color:#00e676;font-family:'Courier New',monospace;font-size:10px;font-weight:700;letter-spacing:2px;padding:10px;margin-bottom:6px;cursor:pointer;}
.nav-go.off{border-color:#444;color:#666;background:#1a1a1a;}
.hint{font-size:8px;color:#444;text-align:center;letter-spacing:1px;margin-bottom:4px;}
.dist,.rssi-line{text-align:center;font-size:10px;color:#00e5ff;margin-top:4px;font-family:'Courier New',monospace;}
.rssi-line{color:#aaa;}
.rssi-line strong{color:#00e5ff;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Warehouse Bot</h1>
  <div class="stats">
    <div class="stat"><span class="lbl">L</span><span class="val" id="lv">0</span></div>
    <div class="div"></div>
    <div class="stat"><span class="lbl">Spd</span><span class="val ok" id="sp">0</span></div>
    <div class="div"></div>
    <div class="stat"><span class="lbl">R</span><span class="val" id="rv">0</span></div>
    <div class="div"></div>
    <div class="stat"><span class="lbl">RSSI</span><span class="val" id="rssiVal">--</span></div>
  </div>
  <div class="row">
    <div class="jw">
      <span class="jlbl">F/B</span>
      <div class="jz" id="lj"><div class="cross"></div><div class="ring"></div><div class="knob" id="lk"></div></div>
    </div>
    <div class="mid">
      <svg width="64" height="64" viewBox="0 0 70 70">
        <circle cx="35" cy="35" r="28" fill="none" stroke="#1e1e1e" stroke-width="5"/>
        <circle cx="35" cy="35" r="28" fill="none" stroke="#00e5ff" stroke-width="5"
          stroke-dasharray="175.9" stroke-dashoffset="175.9"
          stroke-linecap="round" transform="rotate(-90 35 35)" id="arc"/>
        <text x="35" y="40" text-anchor="middle" font-family="Courier New"
          font-size="11" font-weight="700" fill="#00e5ff" id="at">0%</text>
      </svg>
      <button class="estop" id="es">E<br>STOP</button>
    </div>
    <div class="jw">
      <span class="jlbl">L/R</span>
      <div class="jz" id="rj"><div class="cross"></div><div class="ring"></div><div class="knob" id="rk"></div></div>
    </div>
  </div>
  <div class="ipr">
    <span class="lbl">IP</span>
    <input class="ip" id="ip" value="172.20.95.214" spellcheck="false"/>
    <div class="dot" id="dot"></div>
  </div>
  <p class="hint">Beacon: WAREHOUSE_BOX · Calibrate ranges in esp32.ino</p>
  <div class="box-row">
    <button type="button" class="box-btn sel" data-box="1">BOX1</button>
    <button type="button" class="box-btn" data-box="2">BOX2</button>
    <button type="button" class="box-btn" data-box="3">BOX3</button>
  </div>
  <button type="button" class="nav-go" id="navBtn">GO → BOX1</button>
  <div class="btn-row">
    <button type="button" class="mode-btn" id="auto">AUTO<br>AVOID</button>
  </div>
  <div class="rssi-line">Zone: <strong id="zoneName">--</strong> · Target: <strong id="targetLbl">BOX1</strong></div>
  <div class="dist">Distance: <span id="dist">--</span> cm</div>
  <span class="badge" id="badge">Standby</span>
</div>
<script>
(function(){
  var lv=document.getElementById('lv'),rv=document.getElementById('rv'),sp=document.getElementById('sp');
  var arc=document.getElementById('arc'),at=document.getElementById('at');
  var dot=document.getElementById('dot'),badge=document.getElementById('badge');
  var distDisp=document.getElementById('dist'),rssiVal=document.getElementById('rssiVal');
  var zoneName=document.getElementById('zoneName'),targetLbl=document.getElementById('targetLbl');
  var navBtn=document.getElementById('navBtn'),autoBtn=document.getElementById('auto');
  var FB=0,TURN=0,tmr=null,last='';
  var autoMode=false,navMode=false,selectedBox=1,pollTmr=null;

  function ip(){return document.getElementById('ip').value.trim();}
  function base(){return 'http://'+ip();}

  function setBadge(txt,cls){
    badge.textContent=txt;
    badge.className='badge'+(cls?' '+cls:'');
  }

  function joy(zone,knob,cb,axis){
    var on=false,pid=null;
    function blocked(){return autoMode||navMode;}
    function mv(cx,cy){
      if(blocked())return;
      var rc=zone.getBoundingClientRect();
      var dx=cx-(rc.left+rc.width/2), dy=cy-(rc.top+rc.height/2);
      var d=Math.sqrt(dx*dx+dy*dy), max=rc.width/2-20;
      if(d>max){dx=dx/d*max;dy=dy/d*max;}
      knob.style.transform='translate(calc(-50% + '+Math.round(dx)+'px),calc(-50% + '+Math.round(dy)+'px))';
      var val = axis==='y' ? Math.round(-dy/max*255) : Math.round(dx/max*255);
      cb(val);
    }
    function rel(){if(!on)return;on=false;pid=null;knob.classList.remove('on');knob.style.transform='translate(-50%,-50%)';if(!blocked())cb(0);}
    zone.addEventListener('touchstart',function(e){e.preventDefault();on=true;pid=e.changedTouches[0].identifier;knob.classList.add('on');mv(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
    zone.addEventListener('touchmove',function(e){e.preventDefault();if(!on)return;for(var i=0;i<e.changedTouches.length;i++){if(e.changedTouches[i].identifier===pid){mv(e.changedTouches[i].clientX,e.changedTouches[i].clientY);break;}}},{passive:false});
    zone.addEventListener('touchend',rel,{passive:false});
    zone.addEventListener('touchcancel',rel,{passive:false});
    zone.addEventListener('mousedown',function(e){on=true;knob.classList.add('on');mv(e.clientX,e.clientY);function mm(e){if(on)mv(e.clientX,e.clientY);}function mu(){rel();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);}document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);});
  }

  joy(document.getElementById('lj'),document.getElementById('lk'),function(v){FB=v;upd();},'y');
  joy(document.getElementById('rj'),document.getElementById('rk'),function(v){TURN=v;upd();},'x');

  function upd(){
    var L=Math.max(-255,Math.min(255,FB+TURN));
    var R=Math.max(-255,Math.min(255,FB-TURN));
    lv.textContent=L; rv.textContent=R;
    var s=Math.round((Math.abs(L)+Math.abs(R))/2/255*100);
    sp.textContent=s; sp.className='val '+(s>70?'warn':s>0?'ok':'');
    arc.setAttribute('stroke-dashoffset',(175.9-s/100*175.9).toFixed(1));
    at.textContent=s+'%';
    if(!autoMode&&!navMode){
      var mv=L!==0||R!==0;
      setBadge(mv?'Moving':'Standby',mv?'on':'');
      if(!tmr)tmr=setTimeout(function(){tmr=null;var k=L+','+R;if(k!==last){last=k;go(L,R);}},50);
    }
  }

  function go(l,r){
    fetch(base()+'/drive?l='+l+'&r='+r,{mode:'no-cors'}).then(function(){dot.className='dot ok';}).catch(function(){dot.className='dot err';});
  }

  function pollStatus(){
    fetch(base()+'/rssi').then(function(r){return r.json();}).then(function(d){
      dot.className='dot ok';
      rssiVal.textContent=d.smoothed;
      zoneName.textContent=d.box?d.boxName:'unknown';
      if(d.navigating){
        navMode=true;
        navBtn.textContent='STOP NAV';
        navBtn.classList.remove('off');
        setBadge('Nav → BOX'+d.targetBox,'nav');
      }
    }).catch(function(){dot.className='dot err';});

    fetch(base()+'/distance').then(function(r){return r.json();}).then(function(d){
      distDisp.textContent=d.distance;
    }).catch(function(){});
  }

  function startPoll(){
    if(pollTmr)clearInterval(pollTmr);
    pollTmr=setInterval(pollStatus,500);
    pollStatus();
  }

  document.querySelectorAll('.box-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      selectedBox=parseInt(btn.getAttribute('data-box'),10);
      document.querySelectorAll('.box-btn').forEach(function(b){b.classList.remove('sel');});
      btn.classList.add('sel');
      targetLbl.textContent='BOX'+selectedBox;
      if(!navMode)navBtn.textContent='GO → BOX'+selectedBox;
    });
  });

  navBtn.addEventListener('click',function(){
    if(navMode){
      fetch(base()+'/navigate?box=0').catch(function(){});
      navMode=false;
      navBtn.textContent='GO → BOX'+selectedBox;
      navBtn.classList.remove('off');
      autoBtn.classList.remove('active');
      setBadge('Standby','');
      fetch(base()+'/stop',{mode:'no-cors'}).catch(function(){});
      return;
    }
    autoMode=false;
    autoBtn.classList.remove('active');
    navMode=true;
    navBtn.textContent='STOP NAV';
    setBadge('Nav → BOX'+selectedBox,'nav');
    fetch(base()+'/navigate?box='+selectedBox).then(function(){dot.className='dot ok';}).catch(function(){dot.className='dot err';});
  });

  autoBtn.addEventListener('click',function(){
    autoMode=!autoMode;
    autoBtn.classList.toggle('active',autoMode);
    FB=0;TURN=0;
    if(autoMode){
      navMode=false;
      navBtn.textContent='GO → BOX'+selectedBox;
      setBadge('Auto Avoid','on');
      fetch(base()+'/auto?mode=1',{mode:'no-cors'});
    }else{
      setBadge('Standby','');
      fetch(base()+'/auto?mode=0',{mode:'no-cors'}).catch(function(){});
      fetch(base()+'/stop',{mode:'no-cors'}).catch(function(){});
    }
  });

  document.getElementById('es').addEventListener('click',function(){
    FB=0;TURN=0;autoMode=false;navMode=false;
    autoBtn.classList.remove('active');
    navBtn.textContent='GO → BOX'+selectedBox;
    setBadge('STOP','');
    fetch(base()+'/stop',{mode:'no-cors'}).catch(function(){});
    startPoll();
  });

  startPoll();
})();
</script>
</body>
</html>
